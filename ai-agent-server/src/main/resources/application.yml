server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-agent-server

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_agentFZ?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: AiAgentHikariCP

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.easyiot.aiagent.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Ollama 配置
ollama:
  base-url: http://localhost:11434
  default-model: coder-rtx2060:tools #llama3
  code-model: coder-rtx2060:tools #codellama:7b-code
  timeout: 120000
  stream-timeout: 60000

# 向量库配置
vector:
  type: milvus
  dimension: 1024
  milvus:
    host: localhost
    port: 19530
    collection-name: knowledge_base

# 审批配置
approval:
  default-approver:
  notify-enabled: true

# 系统配置
system:
  max-code-length: 50000

# JWT 配置
jwt:
  secret: ai-agent-secret-key-2024-easyiot-com
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.easyiot.aiagent: debug
    org.springframework: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
